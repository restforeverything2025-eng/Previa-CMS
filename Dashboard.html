<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{

      font-family: Arial, sans-serif;

      padding:24px;

      background:#f5f5f5;

    }

    h1{

      margin-top:0;

    }

    .card{

  background:#fff;

  border-radius:12px;

  padding:18px;

  box-shadow:0 1px 4px rgba(0,0,0,.10);

  border:1px solid #ececec;

}

    .dashboard-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

}

.full-width{

  grid-column:1 / -1;

}

    .label{

      color:#666;

      font-size:13px;

    }

    .value{

  font-size:26px;

  font-weight:700;

  color:#202124;

  line-height:1.2;

}

.label{

  font-size:12px;

  color:#5f6368;

  text-transform:uppercase;

  letter-spacing:.6px;

  margin-bottom:6px;

}

  </style>

</head>

<body>

  <h1>PREVIA CMS</h1>

  <div id="dashboard">

    Loading...

  </div>

  <script>

    google.script.run

      .withSuccessHandler(render)

      .getDashboardData();

    function render(data){

      document.getElementById("dashboard").innerHTML =

`
<div class="dashboard-grid">

<div class="card">

<div class="label">Products</div>

<div class="value">${data.products}</div>

</div>

<div class="card">

<div class="label">New Products</div>

<div class="value">${data.newProducts}</div>

</div>

<div class="card">

<div class="label">Folders</div>

<div class="value">${data.folders}</div>

</div>

<div class="card">

<div class="label">Images</div>

<div class="value">${data.images}</div>

</div>

<div class="card full-width">

  <div class="label">Last Publish</div>

  <div class="value">${data.result}</div>

  <div style="margin-top:8px;color:#666;font-size:13px;">

    ${data.date}

  </div>

</div>

</div>

`;

    }

  </script>

</body>

</html>
