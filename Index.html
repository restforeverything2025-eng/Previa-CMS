<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{

    font-family:Arial;

    text-align:center;

    padding:40px;

}

button{

    width:100%;

    max-width:360px;

    height:78px;

    font-size:26px;

    border:none;

    border-radius:18px;

    background:#b98d44;

    color:white;

    cursor:pointer;

    transition:0.25s;

}

#status{

    margin-top:20px;

    font-size:18px;

    color:#666;

    min-height:24px;

}

button:active{

    transform:scale(0.97);

}

button:disabled{

    background:#777;

    cursor:default;

}

</style>

</head>

<body>

<h2>PREVIA Publisher</h2>

<button id="refreshBtn" onclick="refreshImages()">

🖼️ Refresh Images

</button>

<br><br>

<button id="publishBtn" onclick="publishBoutique()">

🚀 Publish Boutique

</button>

<div id="status">Waiting for changes.</div>

<script>

function publishBoutique(){

    const btn =
        document.getElementById(
            "publishBtn"
        );

    const status =
        document.getElementById(
            "status"
        );

    btn.disabled = true;

    btn.innerHTML =
        "⏳ Publishing...";

    status.innerHTML =
        "Publishing... Please wait.";

    google.script.run

    .withSuccessHandler(function(message){

        btn.innerHTML =
            "✅ Published";

        status.innerHTML = message.replace(/\n/g, "<br>");

        setTimeout(function(){

            btn.disabled = false;

            btn.innerHTML =
                "🚀 Publish Boutique";

            status.innerHTML =
                "Ready";

        },10000);

    })

    .withFailureHandler(function(error){

    btn.disabled = false;

    btn.innerHTML =
        "🚀 Publish Boutique";

    status.innerHTML =
        "❌ " + error.message;

})

    .publishFromWeb();

}

function refreshImages(){

    const btn =
        document.getElementById(
            "refreshBtn"
        );

    const status =
        document.getElementById(
            "status"
        );

    btn.disabled = true;

    btn.innerHTML =
        "⏳ Refreshing...";

    status.innerHTML =
        "Refreshing images... Please wait.";

    google.script.run

    .withSuccessHandler(function(message){

        btn.innerHTML =
            "✅ Images Updated";

        status.innerHTML =
            message;

        setTimeout(function(){

            btn.disabled = false;

            btn.innerHTML =
                "🖼️ Refresh Images";

            status.innerHTML =
                "Ready";

        },10000);

    })

    .withFailureHandler(function(error){

        btn.disabled = false;

        btn.innerHTML =
            "🖼️ Refresh Images";

        status.innerHTML =
            "❌ " + error.message;

    })

    .refreshImagesFromWeb();

}

</script>

</body>

</html>
